# Hermes Grant Scout — Конфігурація Hermes Agent
# Копіюється на VM як ~/.hermes/config.yaml

# LLM Backend через OpenRouter
model:
  provider: openrouter
  default: "@preset/f-irst"
  # API ключ береться з .env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

# Messaging Gateway
messaging:
  telegram:
    enabled: true
    # Токен береться з .env: TELEGRAM_BOT_TOKEN
    # Дозволені користувачі беруться з .env: TELEGRAM_CHAT_ID

# Дозволені інструменти для скілу grant-scout
tools:
  shell:
    enabled: true
    # Дозволити виконання Python-скриптів
    allowed_commands:
      - python3
      - pip3
  web_fetch:
    enabled: true
  web_search:
    enabled: true
  file_read:
    enabled: true
  file_write:
    enabled: true

# Шлях до скілів (встановлюється setup-vm.sh)
# skills_path: ~/.hermes/skills

# Налаштування поведінки агента за замовчуванням
agent:
  system_prompt: |
    Вам доступний скіл `grant-scout` (Автоматизований пошук наукових грантів, конференцій, стипендій).
    Якщо користувач звертається з командами керування пошуком або темами (такими як "список тем", "додай тему", "видали тему", "дедлайни", "дайджест", "статус", "пошук зараз", "запусти пошук", "тестовий пошук"), ви ОБЯЗАНІ автоматично завантажити та застосувати інструкції скіла `grant-scout`.
